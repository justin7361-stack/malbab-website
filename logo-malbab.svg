<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" role="img" aria-label="말밥 AI 로고">
  <title>말밥 AI</title>
  <!--
    말밥 AI 로고 — 사용자 참조 이미지 스타일 기반 (2026-04-22)
    구성: 왼쪽 말 머리 라인 아트 + 오른쪽 '말밥 AI' 텍스트
    색상: Racing Green 계열 (#1F5B4A 다크, #6A8F77 라이트)
    스타일: 미니멀, 모던, stroke 기반 라인 아트
  -->
  <defs>
    <style>
      .horse-stroke { fill: none; stroke: #1F5B4A; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }
      .horse-detail { fill: none; stroke: #1F5B4A; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .mane { fill: none; stroke: #1F5B4A; stroke-width: 3; stroke-linecap: round; }
      .brand-main { font-family: 'Noto Sans KR', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; font-size: 44px; font-weight: 800; fill: #1F5B4A; }
      .brand-ai { font-family: 'Inter', 'Helvetica', sans-serif; font-size: 36px; font-weight: 700; fill: #1F5B4A; letter-spacing: -1px; }
    </style>
  </defs>

  <!-- Horse head silhouette (right-facing, line art) -->
  <g transform="translate(15,15)">
    <!-- Main head outline: ears → neck → chin → muzzle -->
    <path class="horse-stroke" d="
      M 18,10
      C 14,5 12,2 14,0
      C 16,-2 20,0 22,4
      L 26,12
      C 32,8 38,5 46,5
      C 58,5 70,10 78,18
      C 85,25 88,34 86,44
      C 84,52 80,58 74,62
      L 72,70
      C 70,78 65,85 58,88
    "/>

    <!-- Under-jaw / throat curve -->
    <path class="horse-detail" d="
      M 74,62
      C 68,64 62,65 56,65
      C 50,65 46,62 44,58
    "/>

    <!-- Ear -->
    <path class="horse-stroke" d="
      M 22,4
      C 24,0 28,-2 32,0
      L 34,6
    "/>

    <!-- Mane flowing back -->
    <path class="mane" d="M 28,10 C 22,20 18,32 20,44 C 22,54 26,62 32,68"/>
    <path class="mane" d="M 34,8  C 30,18 28,30 32,42"/>
    <path class="mane" d="M 40,6  C 38,14 38,24 42,32"/>

    <!-- Eye -->
    <circle cx="62" cy="30" r="2.5" fill="#1F5B4A"/>

    <!-- Nostril -->
    <path class="horse-detail" d="M 82,42 C 84,44 84,48 82,50"/>
  </g>

  <!-- Vertical separator (subtle) -->
  <line x1="135" y1="35" x2="135" y2="95" stroke="#E9F1EB" stroke-width="2" stroke-linecap="round"/>

  <!-- Brand text: 말밥 AI -->
  <text x="155" y="72" class="brand-main">말밥</text>
  <text x="278" y="72" class="brand-ai">AI</text>

  <!-- Tagline (optional, smaller) -->
  <text x="155" y="96" style="font-family: 'Noto Sans KR', sans-serif; font-size: 12px; fill: #6A8F77; letter-spacing: 0.5px;">
    데이터로 더 건강한 경마 문화
  </text>
</svg>
